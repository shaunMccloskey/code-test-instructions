services:
  mongodb:
    image: mongo:7.0
    container_name: url-shortener-mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_DATABASE=urlshortener
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    networks:
      - url-shortener-network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend:
    build:
      context: ./url-shortener-backend
      dockerfile: Dockerfile
    container_name: url-shortener-backend
    restart: unless-stopped
    environment:
      - SERVER_PORT=8080
      - BASE_URL=http://localhost:8080
      - MONGODB_URI=mongodb://mongodb:27017/urlshortener
      - CORS_ORIGINS=http://localhost:3000,http://localhost:80
    ports:
      - "8080:8080"
    networks:
      - url-shortener-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/urls" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  mongodb_data:
    driver: local

networks:
  url-shortener-network:
    driver: bridge