version: '3.8'


services:
  backend:
    build:
      context: ./url-shortener-backend
      dockerfile: Dockerfile
    container_name: url-shortener-backend
    restart: unless-stopped
    environment:
      - SERVER_PORT=8080
      - BASE_URL=http://localhost:8080
    ports:
      - "8080:8080"
    networks:
      - url-shortener-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/urls" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s


networks:
  url-shortener-network:
    driver: bridge